<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
*{box-sizing:border-box;}
.dchscroll::-webkit-scrollbar{height:8px;width:8px;}
.dchscroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.16);border-radius:5px;}
.dchscroll::-webkit-scrollbar-track{background:transparent;}
</style>
</helmet>
<div style="width:100%;height:100%;display:flex;flex-direction:column;background:#141416;color:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,'Inter',sans-serif;border-top:1px solid rgba(255,255,255,0.09);overflow:hidden;">
  <!-- header -->
  <div style="height:34px;flex:none;display:flex;align-items:center;gap:9px;padding:0 14px;border-bottom:1px solid rgba(255,255,255,0.06);background:#101012;">
    <span style="{{ dotStyle }}"></span>
    <span style="font-size:12px;font-weight:600;color:#f5f5f7;letter-spacing:-0.2px;">{{ trackName }}</span>
    <span style="font-size:10px;color:#6b6b70;letter-spacing:0.4px;text-transform:uppercase;font-weight:600;">Device Chain</span>
    <span style="font-size:10.5px;color:#86868b;">{{ countLabel }}</span>
    <div style="flex:1;"></div>
    <span style="font-size:10.5px;color:#86868b;display:flex;align-items:center;gap:5px;"><span style="width:6px;height:6px;border-radius:50%;background:#54c98a;"></span> Signal flow →</span>
    <span onClick="{{ onClose }}" style="width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:rgba(255,255,255,0.06);color:#b6b6bb;font-size:14px;cursor:pointer;">✕</span>
  </div>

  <!-- devices -->
  <div class="dchscroll" style="flex:1;min-height:0;display:flex;align-items:stretch;gap:10px;padding:12px 14px;overflow-x:auto;overflow-y:hidden;background:linear-gradient(180deg,#161618,#1b1b1e);">
    <!-- input chip -->
    <div style="flex:none;align-self:center;display:flex;flex-direction:column;align-items:center;gap:5px;color:#6b6b70;">
      <div style="width:30px;height:30px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:13px;">⌁</div>
      <span style="font-size:8px;letter-spacing:0.4px;">IN</span>
    </div>

    <sc-for list="{{ devices }}" as="dev" hint-placeholder-count="4">
      <div style="{{ dev.boxStyle }}">
        <div style="{{ dev.titleStyle }}">
          <span style="{{ dev.ledStyle }}"></span>
          <span style="font-size:11px;font-weight:600;color:#16161a;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-0.1px;">{{ dev.name }}</span>
          <sc-if value="{{ dev.ai }}" hint-placeholder-val="{{ false }}"><span style="font-size:9px;color:#0a4da8;font-weight:700;">✦</span></sc-if>
        </div>
        <div style="padding:5px 11px 3px;display:flex;align-items:center;justify-content:space-between;">
          <span style="font-size:8px;letter-spacing:0.3px;color:#7a7a80;text-transform:uppercase;font-weight:600;">{{ dev.kindLabel }}</span>
          <span style="font-size:8px;color:#5a5a5f;">{{ dev.preset }}</span>
        </div>
        <sc-if value="{{ dev.hasGraph }}" hint-placeholder-val="{{ false }}">
          <div style="margin:2px 11px 4px;height:34px;border-radius:6px;background:#0c0c0e;border:1px solid rgba(255,255,255,0.06);position:relative;overflow:hidden;">
            <svg width="100%" height="34" viewBox="0 0 132 34" preserveAspectRatio="none" style="display:block;"><path d="{{ dev.graphPath }}" fill="none" stroke="{{ dev.color }}" stroke-width="1.6"></path></svg>
          </div>
        </sc-if>
        <div style="flex:1;display:flex;flex-wrap:wrap;gap:9px 10px;align-content:flex-start;padding:6px 11px 11px;">
          <sc-for list="{{ dev.controls }}" as="ctl" hint-placeholder-count="3">
            <div style="display:flex;flex-direction:column;align-items:center;gap:4px;width:38px;">
              <div style="{{ ctl.knob.ring }}"><div style="{{ ctl.knob.cap }}"></div><div style="{{ ctl.knob.pointer }}"></div></div>
              <span style="font-size:8px;color:#9a9aa0;font-weight:500;white-space:nowrap;">{{ ctl.label }}</span>
            </div>
          </sc-for>
        </div>
      </div>
      <div style="flex:none;align-self:center;color:#4a4a4f;font-size:13px;">→</div>
    </sc-for>

    <!-- add device -->
    <div style="flex:none;width:120px;align-self:stretch;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;border:1px dashed rgba(255,255,255,0.14);border-radius:11px;color:#6b6b70;cursor:pointer;">
      <span style="font-size:20px;line-height:1;">+</span>
      <span style="font-size:10px;font-weight:500;">Drop a device</span>
    </div>

    <!-- output chip -->
    <div style="flex:none;align-self:center;display:flex;flex-direction:column;align-items:center;gap:5px;color:#6b6b70;">
      <div style="{{ outDotStyle }}"></div>
      <span style="font-size:8px;letter-spacing:0.4px;">{{ outLabel }}</span>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1100,&quot;height&quot;:200},&quot;trackName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Lead Vocal&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;color&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#5aa9a0&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;devices&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any[]&quot;},&quot;onClose&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;out&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Bus&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  rgba(hex,a){ const n=parseInt(hex.slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }
  rng(seed){ let t=seed>>>0; return ()=>{ t+=0x6D2B79F5; let r=Math.imul(t^t>>>15,1|t); r^=r+Math.imul(r^r>>>7,61|r); return ((r^r>>>14)>>>0)/4294967296; }; }

  knob(val,color,size){
    val=Math.max(0,Math.min(1,val)); const deg=val*270; const ptr=-135+val*270;
    return {
      ring:{ width:size+'px', height:size+'px', borderRadius:'50%', position:'relative', flex:'none',
        background:`conic-gradient(from 225deg, ${color} 0deg, ${color} ${deg.toFixed(0)}deg, rgba(255,255,255,0.09) ${deg.toFixed(0)}deg, rgba(255,255,255,0.09) 270deg, transparent 270deg)` },
      cap:{ position:'absolute', inset:'3px', borderRadius:'50%', background:'radial-gradient(circle at 50% 32%, #34343a, #131315)', boxShadow:'inset 0 1px 1px rgba(255,255,255,0.1), 0 1px 2px rgba(0,0,0,0.5)' },
      pointer:{ position:'absolute', left:'50%', top:'50%', width:'2px', height:(size*0.34).toFixed(1)+'px', background:'#e8e8ea', borderRadius:'1px', transformOrigin:'50% 100%', transform:`translate(-50%,-100%) rotate(${ptr.toFixed(0)}deg)` }
    };
  }

  graphFor(kind, color, seed){
    const W=132,H=34,mid=H/2; const rnd=this.rng(seed);
    if(kind==='eq'){
      // smooth EQ curve
      const pts=[]; const n=24;
      for(let i=0;i<n;i++){ const x=i/(n-1)*W; const y=mid - Math.sin(i/n*Math.PI*2+rnd()*0.5)*(6+rnd()*7); pts.push([x,Math.max(3,Math.min(H-3,y))]); }
      return 'M '+pts.map(p=>p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' L ');
    }
    if(kind==='dyn'){
      // compressor transfer: line then knee
      return `M 3 ${H-3} L ${W*0.45} ${H*0.42} L ${W-3} ${H*0.3}`;
    }
    // generic
    const pts=[]; const n=20;
    for(let i=0;i<n;i++){ const x=i/(n-1)*W; const y=mid-Math.sin(i*0.6)*(4+rnd()*8); pts.push([x,y]); }
    return 'M '+pts.map(p=>p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' L ');
  }

  renderVals(){
    const trackColor = this.props.color || '#5aa9a0';
    const raw = this.props.devices || [];
    const KIND = {
      eq:{label:'Equalizer', color:'#6f9fc8'}, dyn:{label:'Dynamics', color:'#e0a955'},
      sat:{label:'Saturation', color:'#d9774f'}, fx:{label:'Effect', color:'#9a7cb8'},
      synth:{label:'Instrument', color:'#5aa9a0'}, util:{label:'Utility', color:'#8a8f96'},
    };
    const devices = raw.map((d,i)=>{
      const meta = KIND[d.kind] || KIND.fx;
      const color = d.color || meta.color;
      const hasGraph = d.kind==='eq' || d.kind==='dyn';
      return {
        name:d.name, ai:!!d.ai, color, kindLabel: meta.label, preset: d.preset || 'Custom', hasGraph,
        graphPath: hasGraph ? this.graphFor(d.kind, color, (i+1)*7919+(d.name?d.name.length:3)*131) : '',
        boxStyle:{ width:'160px', minWidth:'160px', flex:'none', display:'flex', flexDirection:'column', borderRadius:'10px', overflow:'hidden',
          background:'#1c1c1f', border:'1px solid '+(d.ai?'rgba(41,151,255,0.45)':'rgba(255,255,255,0.08)'),
          boxShadow: d.ai?'0 0 0 1px rgba(41,151,255,0.14), 0 8px 22px rgba(0,0,0,0.3)':'0 6px 16px rgba(0,0,0,0.25)', opacity: d.on===false?0.55:1 },
        titleStyle:{ display:'flex', alignItems:'center', gap:'6px', padding:'6px 10px', background:color, flex:'none' },
        ledStyle:`width:7px;height:7px;border-radius:50%;flex:none;background:${d.on===false?'#5a5a5f':'#1c3a24'};box-shadow:${d.on===false?'none':'0 0 5px rgba(40,200,110,0.7)'};border:1px solid rgba(0,0,0,0.25);`,
        controls:(d.controls||[]).map(c=>({ label:c[0], knob:this.knob(c[1], color, 26) })),
      };
    });

    return {
      trackName: this.props.trackName || 'Track',
      onClose: this.props.onClose || (()=>{}),
      dotStyle:`width:10px;height:10px;border-radius:3px;flex:none;background:${trackColor};`,
      countLabel: devices.length + ' devices',
      devices,
      outDotStyle:`width:30px;height:30px;border-radius:8px;border:1px solid ${this.rgba(trackColor,0.5)};background:${this.rgba(trackColor,0.16)};`,
      outLabel: (this.props.out || 'OUT').toUpperCase(),
    };
  }
}
</script>
</body>
</html>
